<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تجربتي الأولى</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    text-align:center;
}

button{
    background:#007BFF;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="card">
<h1>مرحباً بك 👋</h1>
<p>هذه أول واجهة مستخدم لي على GitHub.</p>

<button onclick="alert('أحسنت! لقد نجحت.')">
اضغط هنا
</button>
</div>

</body>
</html>
